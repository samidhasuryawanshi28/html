<!DOCTYPE html>
<html>
<head>
<title>Digital Clock Productivity Suite</title>

<style>
*{
    box-sizing:border-box;
    font-family:Segoe UI, sans-serif;
}

body{
    margin:0;
    min-height:100vh;
    background:#0f172a;
    color:white;
}

header{
    text-align:center;
    padding:20px;
    background:#020617;
}

h1{
    margin:0;
}

.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:20px;
    padding:20px;
}

.card{
    background:#1e293b;
    padding:20px;
    border-radius:18px;
    box-shadow:0 10px 25px #0005;
}

.clock{
    font-size:45px;
    text-align:center;
    color:#38bdf8;
}

button{
    background:#38bdf8;
    border:none;
    padding:10px 15px;
    margin:5px;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#0ea5e9;
}

input,select{
    padding:10px;
    border-radius:8px;
    border:none;
    margin:5px;
}

.display{
    font-size:35px;
    text-align:center;
    margin:15px;
}

.progress{
    height:15px;
    background:#334155;
    border-radius:20px;
    overflow:hidden;
}

.bar{
    height:100%;
    width:0%;
    background:#22c55e;
    transition:.3s;
}

ul{
    max-height:150px;
    overflow:auto;
}

.lap{
    background:#334155;
    padding:5px;
    margin:5px;
    border-radius:5px;
}
</style>

</head>

<body>

<header>
<h1>⏱ Digital Clock Productivity Suite</h1>
</header>


<div class="container">


<div class="card">
<h2>Digital Clock</h2>

<div class="clock" id="clock"></div>
<p id="date"></p>

</div>



<div class="card">
<h2>World Clock</h2>

<select id="zone">
<option value="America/New_York">New York</option>
<option value="Europe/London">London</option>
<option value="Asia/Tokyo">Tokyo</option>
<option value="Asia/Kolkata">India</option>
</select>

<div class="display" id="world"></div>

</div>




<div class="card">

<h2>Stopwatch</h2>

<div class="display" id="stopwatch">
00:00:00
</div>

<button onclick="startWatch()">Start</button>
<button onclick="pauseWatch()">Pause</button>
<button onclick="resetWatch()">Reset</button>
<button onclick="lap()">Lap</button>

<ul id="laps"></ul>

</div>





<div class="card">

<h2>Countdown Timer</h2>

<input id="seconds" type="number" placeholder="Seconds">

<button onclick="startTimer()">Start</button>

<div class="display" id="timer">
00
</div>

<div class="progress">
<div class="bar" id="timerBar"></div>
</div>

</div>







<div class="card">

<h2>Alarm</h2>

<input id="alarmTime" type="time">

<button onclick="setAlarm()">Add Alarm</button>

<ul id="alarms"></ul>

</div>







<div class="card">

<h2>Pomodoro</h2>

<div class="display" id="pomodoro">
25:00
</div>


<button onclick="startPomodoro()">Start</button>
<button onclick="stopPomodoro()">Stop</button>


<div class="progress">
<div class="bar" id="pomoBar"></div>
</div>

</div>







<div class="card">

<h2>Session History</h2>

<ul id="history"></ul>

</div>



</div>




<script>


// DIGITAL CLOCK

function updateClock(){

let now=new Date();

document.getElementById("clock").innerHTML=
now.toLocaleTimeString();

document.getElementById("date").innerHTML=
now.toDateString();


let zone=document.getElementById("zone").value;

document.getElementById("world").innerHTML=
new Intl.DateTimeFormat(
"en-US",
{
timeZone:zone,
timeStyle:"medium"
}
).format(now);

}

setInterval(updateClock,1000);






// STOPWATCH

let swStart;
let swElapsed=0;
let swTimer;
let running=false;


function startWatch(){

if(running)return;

running=true;

swStart=Date.now()-swElapsed;

swTimer=setInterval(()=>{

swElapsed=Date.now()-swStart;

showWatch();

},1000);

}


function pauseWatch(){

running=false;
clearInterval(swTimer);

saveHistory("Stopwatch",swElapsed);

}



function resetWatch(){

pauseWatch();
swElapsed=0;
showWatch();

}


function showWatch(){

let sec=Math.floor(swElapsed/1000);

let h=Math.floor(sec/3600);

let m=Math.floor((sec%3600)/60);

let s=sec%60;


document.getElementById("stopwatch")
.innerHTML=
`${h}:${m}:${s}`;

}



function lap(){

let li=document.createElement("li");

li.className="lap";

li.innerHTML=
document.getElementById("stopwatch").innerHTML;

document.getElementById("laps").appendChild(li);

}







// COUNTDOWN

let timer;


function startTimer(){

let total=
Number(document.getElementById("seconds").value);

let left=total;


clearInterval(timer);


timer=setInterval(()=>{


document.getElementById("timer").innerHTML=left;


let percent=((total-left)/total)*100;

document.getElementById("timerBar")
.style.width=percent+"%";


left--;


if(left<0){

clearInterval(timer);

alert("Timer Complete!");

saveHistory("Countdown",total);

}


},1000);

}







// ALARM

let alarms=[];


function setAlarm(){

let t=document.getElementById("alarmTime").value;

alarms.push(t);

displayAlarms();

}


function displayAlarms(){

document.getElementById("alarms").innerHTML=
alarms.map(x=>"<li>"+x+"</li>").join("");

}



setInterval(()=>{

let now=new Date()
.toTimeString()
.slice(0,5);


if(alarms.includes(now)){

alert("⏰ Alarm Ringing!");

}

},1000);







// POMODORO

let pomo=1500;
let pomoTimer;


function startPomodoro(){

clearInterval(pomoTimer);

pomoTimer=setInterval(()=>{

pomo--;

let min=Math.floor(pomo/60);
let sec=pomo%60;


document.getElementById("pomodoro")
.innerHTML=
`${min}:${sec}`;


document.getElementById("pomoBar")
.style.width=
((1500-pomo)/1500*100)+"%";



if(pomo<=0){

clearInterval(pomoTimer);

alert("Focus session finished");

saveHistory("Pomodoro",1500);

pomo=1500;

}

},1000);

}



function stopPomodoro(){

clearInterval(pomoTimer);

}







// HISTORY


let history=
JSON.parse(localStorage.getItem("history"))
||[];


function saveHistory(type,time){

history.push({

type:type,
date:new Date().toLocaleString(),
time:Math.floor(time/1000)+" seconds"

});


localStorage.setItem(
"history",
JSON.stringify(history)
);


loadHistory();

}




function loadHistory(){

document.getElementById("history")
.innerHTML=

history
.map(
x=>
`<li>${x.type} - ${x.time}<br>${x.date}</li>`
)
.join("");

}


loadHistory();



</script>


</body>
</html>
